<!doctype html>
<html lang="en">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>KO6IUE Grid Explorer</title>

    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="docs/images/favicon.ico"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <!-- Make sure you put this AFTER leaflet.js -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet.geodesic"></script>

    <script type="text/javascript" src="assets/adiftool.js"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      .leaflet-container {
        height: 90%;
        width: 100%;
        max-width: 100%;
        max-height: 100%;
      }
      .info {
        padding: 6px 8px;
        font:
          14px/16px Arial,
          Helvetica,
          sans-serif;
        background: white;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        border-radius: 5px;
      }
      .info h4 {
        margin: 0 0 5px;
        color: #000;
      }
    </style>
  </head>

  <body>
    <b
      ><i>&nbsp;<a href="https://ko6iue.org/">KO6IUE</a> Grid Explorer</i>
      &#127760;</b
    >
    <label for="file-input" class="custom-file-upload">
      Select <i>your</i> ADIF File →</label
    >
    <input type="file" id="file-input" />
    <div id="message"></div>
    <div id="map"></div>

    <script>
      var stations; // populated by L.geojson later...
      var grids; // populated by L.geojson later...
      var max_grid_qsos; // populated by geojsonLoad()
      var geodesicLine;
      var totalStations;
      var totalQSOs;

      function getColors(props) {
        const colors = [
          ["#f2f0f7", "#cbc9e2", "#9e9ac8", "#756bb1", "#54278f"],
          ["#f7f7f7", "#cccccc", "#969696", "#636363", "#252525"],
        ];
        return props.confirmed ? colors[0] : colors[1];
      }

      const map = L.map("map", { worldCopyJump: true }).setView([11, 11], 2);

      const tiles = L.tileLayer(
        "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
          maxZoom: 19,
          minZoom: 2,
          attribution:
            '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        },
      ).addTo(map);

      function getGridColor(feature) {
        // We use the log function to handle the positive skew
        var props = feature.properties;
        grid_log = Math.log(props.num_qsos);
        return grid_log > grid_max_qsos * 0.8
          ? getColors(props)[4]
          : grid_log > grid_max_qsos * 0.6
            ? getColors(props)[3]
            : grid_log > grid_max_qsos * 0.4
              ? getColors(props)[2]
              : grid_log > grid_max_qsos * 0.2
                ? getColors(props)[1]
                : getColors(props)[0];
      }

      var info = L.control();

      info.onAdd = function (map) {
        this._div = L.DomUtil.create("div", "info"); // create a div with a class "info"
        this.updateStation();
        this.updateGrid();
        return this._div;
      };

      function defaultMessage() {
        return (
          (totalStations
            ? "<b>Total Stations:</b> " + totalStations + "<br/>"
            : "") +
          (totalQSOs ? "<b>Total QSOs:</b> " + totalQSOs + "<br/>" : "") +
          "Hover over a station or grid for information.<br/>" +
          "Click on a station to launch its QRZ page.<br/>" +
          "Click on a grid to zoom to it.<br/>"
        );
      }

      function stationPropsHTML(props) {
        s = "<h4>Station " + props.call + "</h4><br/>";
        s += "<b>";
        s += props.confirmed ? "Confirmed" : "Unconfirmed";
        s += "</b><br/>";
        if (props.name) {
          s += "<b>Name:</b> " + props.name + "<br/>";
        }
        if (props.grid) {
          s += "<b>Grid:</b> " + props.grid + "<br/>";
        }
        if (props.lat) {
          s += "<b>Latitude:</b> " + props.lat + "&deg<br/>";
        }
        if (props.lon) {
          s += "<b>Longitude:</b> " + props.lon + "&deg;<br/>";
        }
        if (props.distance) {
          s += "<b>Distance:</b> " + props.distance + " km<br/>";
        }
        if (props.bearing_sent) {
          s += "<b>Bearing sent:</b> " + props.bearing_sent + "&deg;<br/>";
        }
        if (props.bearing_rcvd) {
          s += "<b>Bearing rcvd:</b> " + props.bearing_rcvd + "&deg;<br/>";
        }
        if (props.QTH) {
          s += "<b>QTH:</b> " + props.QTH + "<br/>";
        }
        if (props.QSOs) {
          s += "<b>QSOs:</b> " + props.QSOs + "<br/>";
        }
        if (props.country) {
          s += "<b>Country:</b> " + props.country + "<br/>";
        }
        return s;
      }

      // method that we will use to update the control based on feature properties passed
      info.updateStation = function (props) {
        if (!props) {
          this._div.innerHTML = defaultMessage();
        } else {
          this._div.innerHTML = stationPropsHTML(props);
        }
      };

      info.updateGrid = function (props) {
        if (!props) {
          this._div.innerHTML = defaultMessage();
        } else {
          s = "<h4>Grid " + props.name + "</h4>";
          s += "<b>";
          s += props.confirmed ? "Confirmed" : "Unconfirmed";
          s += "</b><br/>";
          if (props.num_stations) {
            s += "<b>Num Stations:</b> " + props.num_stations + "<br/>";
          }
          if (props.num_confirmed_stations) {
            s +=
              "<b>Confirmed Stations:</b> " +
              props.num_confirmed_stations +
              "<br/>";
          }
          if (props.num_qsos) {
            s += "<b>Num QSOs:</b> " + props.num_qsos + "<br/>";
          }
          if (props.lat_range) {
            s +=
              "<b>Latitude:</b> " +
              props.lat_range[0] +
              " to " +
              props.lat_range[1] +
              "&deg;<br/>";
          }
          if (props.lon_range) {
            s +=
              "<b>Longitude:</b> " +
              props.lon_range[0] +
              " to " +
              props.lon_range[1] +
              "&deg;<br/>";
          }
          this._div.innerHTML = s;
        }
      };

      info.addTo(map);

      function highlightStation(e) {
        var layer = e.target;
        var feature = layer.feature;
        var props = feature.properties;

        info.updateStation(props);

        if (props.qth_lat) {
          geodesicLine = new L.Geodesic(
            [
              [props.lat, props.lon],
              [props.qth_lat, props.qth_lon],
            ],
            { color: getColors(props)[4], dashArray: 3, weight: 3 },
          ).addTo(map);
        }

        layer.setStyle({
          weight: 6,
          radius: 6,
        });
      }

      function resetStation(e) {
        var layer = e.target;
        stations.resetStyle(layer);
        info.updateStation();
        geodesicLine.remove();
      }

      function clickStation(e) {
        var layer = e.target;
        var feature = layer.feature;
        var props = feature.properties;
        window.open("https://www.qrz.com/db/" + props.call);
      }

      function onEachStation(feature, layer) {
        layer.on({
          mouseover: highlightStation,
          mouseout: resetStation,
          click: clickStation,
        });
      }

      function getStationColor(feature) {
        var props = feature.properties;
        return getColors(props)[4];
      }

      function stationStyle(feature) {
        var props = feature.properties;
        return props.confirmed
          ? {
              color: getColors(props)[4],
              radius: 4,
              fillColor: getColors(props)[2],
              opacity: 1,
              fillOpacity: 1.0,
            }
          : {
              color: getColors(props)[4],
              fillColor: getColors(props)[2],
              radius: 4,
              opacity: 0.5,
              fillOpacity: 0.5,
            };
      }

      var stationOptions = {
        pointToLayer: function (feature, latlng) {
          return L.circleMarker(latlng);
        },
        style: stationStyle,
        onEachFeature: onEachStation,
      };

      function highlightGrid(e) {
        var layer = e.target;
        var props = layer.feature.properties;

        info.updateGrid(props);

        layer.setStyle({
          weight: 5,
          color: getColors(props)[4],
          dashArray: "",
          //fillOpacity: 0.7,
        });
      }

      function resetGrid(e) {
        grids.resetStyle(e.target);
        info.updateGrid();
      }

      function clickGrid(e) {
        map.fitBounds(e.target.getBounds());
      }

      function onEachGrid(feature, layer) {
        layer.on({
          mouseover: highlightGrid,
          mouseout: resetGrid,
          click: clickGrid,
        });
      }

      function gridStyle(feature) {
        let props = feature.properties;
        return {
          color: getColors(props)[4],
          fillColor: getGridColor(feature),
          weight: 2,
          opacity: 1,
          fillOpacity: 0.4,
          dashArray: 3,
        };
      }

      var gridOptions = {
        style: gridStyle,
        onEachFeature: onEachGrid,
      };

      function clearMap() {
        if (geodesicLine) {
          geodesicLine.remove();
        }
        if (stations) {
          map.removeLayer(stations);
        }
        if (grids) {
          map.removeLayer(grids);
        }
      }

      function geojsonLoad(json) {
        clearMap();
        grid_max_qsos = Math.log(json[1].properties.grid_max_qsos);
        stations = L.geoJSON(json[0], stationOptions).addTo(map);
        grids = L.geoJSON(json[1], gridOptions).addTo(map);
        let props = json[1].properties;
        if (props.num_stations) {
          totalStations = props.num_stations;
        }
        if (props.total_qsos) {
          totalQSOs = props.total_qsos;
        }
        // Make sure stations are always on top or grid will mask them
        stations.bringToFront();
      }

      /* For now, load sample data from a fixed location. In the
           future, provide a way to users to convert their ADIF to
           Grid Explorer GeoJSON to enable publishing/sharing their
           contacts */
      async function getData() {
        const url = "https://ko6iue.org/assets/contacts.json";
        try {
          const response = await fetch(url);
          if (!response.ok) {
            throw new Error(`Response status: ${response.status}`);
          }

          const result = await response.json();
          geojsonLoad(result);
        } catch (error) {
          console.error(error.message);
        }
      }
      getData();

      document
        .getElementById("file-input")
        .addEventListener("change", function () {
          const file = this.files[0];

          const messageDisplay = document.getElementById("message");
          messageDisplay.textContent = ""; // Clear previous messages
          function showMessage(message) {
            messageDisplay.textContent = message;
            messageDisplay.style.color = "red";
          }

          if (!file) {
            showMessage("No file selected. Please choose a file.");
            return;
          }

          const reader = new FileReader();
          reader.onload = () => {
            var utf8 = stringToNewUTF8(reader.result);
            try {
              var rval = UTF8ToString(_adi2geojson(utf8));
              if (!rval || rval.length == 0) {
                showMessage("Invalid file. No ADIF data.");
                return;
              }
              var json = JSON.parse(rval);
              geojsonLoad(json);
            } catch (e) {
              showMessage(e.message, "error");
            }
          };
          reader.onerror = () => {
            showMessage("Error reading the file. Please try again.");
          };

          reader.readAsText(file);
        });
    </script>

  </body>
</html>
