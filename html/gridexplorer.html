<!doctype html>
<html lang="en">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>KO6IUE Grid Explorer</title>

    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="docs/images/favicon.ico"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <!-- Make sure you put this AFTER leaflet.js -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet.geodesic"></script>

    <script type="text/javascript" src="assets/adiftool.js"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      .leaflet-container {
        height: 90%;
        width: 100%;
        max-width: 100%;
        max-height: 100%;
      }
      .info {
        width: 200px;
        padding: 6px 8px;
        font:
          14px/16px Arial,
          Helvetica,
          sans-serif;
        background: white;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        border-radius: 5px;
      }
      .info h4 {
        margin: 0 0 5px;
        color: #000;
      }
    </style>
  </head>

  <body>
    <b
      ><i>&nbsp;<a href="https://ko6iue.org/">KO6IUE</a> Grid Explorer</i>
      &#127760;</b
    >
    <label for="file-input" class="custom-file-upload">
      Select <i>your</i> ADIF File →</label
    >
    <input type="file" id="file-input" />
    <div id="message"></div>
    <div id="map"></div>

    <script>
      var stationLayer; // populated by L.geojson later...
      var gridLayer; // populated by L.geojson later...
      var globals = {};
      var max_grid_qsos; // populated by geojsonLoad()
      var geodesicLine;
      var layerCtrl;

      function getColors(props) {
        const colors = [
          ["#f2f0f7", "#cbc9e2", "#9e9ac8", "#756bb1", "#54278f"],
          ["#f7f7f7", "#cccccc", "#969696", "#636363", "#252525"],
        ];
        return props.confirmed ? colors[0] : colors[1];
      }

      const map = L.map("map", { worldCopyJump: true }).setView([11, 11], 2);

      const tiles = L.tileLayer(
        "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
          maxZoom: 19,
          minZoom: 2,
          attribution:
            '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        },
      ).addTo(map);

      L.control.scale().addTo(map);

      function getGridColor(feature) {
        // We use the log function to handle the positive skew
        var props = feature.properties;
        grid_log = Math.log(props.num_qsos);
        return grid_log > grid_max_qsos * 0.8
          ? getColors(props)[4]
          : grid_log > grid_max_qsos * 0.6
            ? getColors(props)[3]
            : grid_log > grid_max_qsos * 0.4
              ? getColors(props)[2]
              : grid_log > grid_max_qsos * 0.2
                ? getColors(props)[1]
                : getColors(props)[0];
      }

      var info = L.control();

      info.onAdd = function (map) {
        this._div = L.DomUtil.create("div", "info"); // create a div with a class "info"
        this.updateStation();
        this.updateGrid();
        return this._div;
      };

      function counterHTML(name, counter) {
        let s = "";
        if (counter) {
          s += "<b>" + name + ":</b><br/>";
          counter.forEach(function (item, index) {
            s += item[0] + " (" + item[1] + ", " + item[2] + "%)<br/>";
          });
        }
        return s;
      }

      function nameValueHTML(items) {
        let s = "";
        items.forEach(function (item, index) {
          if (item[1]) {
            s += "<b>" + item[0] + ":</b> " + item[1] + "<br/>";
          }
        });
        return s;
      }

      function defaultMessage() {
        return (
          "<h4>Global Summary</h4><hr>" +
          (nameValueHTML([
            ["Total Stations", globals.total_stations],
            ["Countries", globals.total_countries],
            ["Confirmed Countries", globals.total_confirmed_countries],
            ["Total QSOs", globals.total_qsos],
          ]) +
            counterHTML("Modes", globals.modes) +
            counterHTML("Bands", globals.bands) +
            nameValueHTML([
              ["Oldest QSO", globals.first_contact],
              ["Latest QSO", globals.last_contact],
            ]) +
            "<hr><b>Hover over</b> a station or grid for information.<br/>" +
            "<b>Click on</b> a station to launch its QRZ page.<br/>" +
            "<b>Click on</b> a grid to zoom to it.<br/>")
        );
      }

      function stationPropsHTML(props) {
        s = "<h4>Station " + props.call + "</h4>";
        s += "<hr><b>";
        s += props.confirmed ? "Confirmed" : "Unconfirmed";
        s += "</b><br/>";
        s +=
          nameValueHTML([
            ["Name", props.name],
            ["QSOs", props.QSOs],
          ]) +
          counterHTML("Modes", props.modes) +
          counterHTML("Bands", props.bands) +
          nameValueHTML([
            ["QTH", props.QTH],
            ["Grid", props.grid],
            ["Country", props.country],
            ["Latitude", props.lat + "&deg;"],
            ["Longitude", props.lon + "&deg;"],
            ["Distance", props.distance],
            ["Bearing sent", props.bearing_sent],
            ["Bearing rcvd", props.bearing_rcvd],
            ["Oldest QSO", props.first_contact],
            ["Latest QSO", props.last_contact],
          ]);
        return s;
      }

      // method that we will use to update the control based on feature properties passed
      info.updateStation = function (props) {
        if (!props) {
          this._div.innerHTML = defaultMessage();
        } else {
          this._div.innerHTML = stationPropsHTML(props);
        }
      };

      info.updateGrid = function (props) {
        if (!props) {
          this._div.innerHTML = defaultMessage();
        } else {
          s = "<h4>Grid " + props.name + "</h4>";
          s += "<hr>";
          s += "<b>";
          s += props.confirmed ? "Confirmed" : "Unconfirmed";
          s +=
            "</b><br/>" +
            nameValueHTML([
              ["Num Stations", props.num_stations],
              ["Confirmed Stations", props.num_confirmed_stations],
              ["Num QSOs", props.num_qsos],
            ]) +
            counterHTML("Modes", props.modes) +
            counterHTML("Bands", props.bands);
          if (props.lat_range) {
            s +=
              "<b>Latitude:</b> " +
              props.lat_range[0] +
              " to " +
              props.lat_range[1] +
              "&deg;<br/>";
          }
          if (props.lon_range) {
            s +=
              "<b>Longitude:</b> " +
              props.lon_range[0] +
              " to " +
              props.lon_range[1] +
              "&deg;<br/>";
          }
          s += nameValueHTML([
            ["Oldest QSO", props.first_contact],
            ["Latest QSO", props.last_contact],
          ]);
          this._div.innerHTML = s;
        }
      };

      info.addTo(map);

      function highlightStation(e) {
        var layer = e.target;
        var feature = layer.feature;
        var props = feature.properties;

        info.updateStation(props);

        if (props.qth_lat) {
          geodesicLine = new L.Geodesic(
            [
              [props.lat, props.lon],
              [props.qth_lat, props.qth_lon],
            ],
            { color: getColors(props)[4], dashArray: 3, weight: 3 },
          ).addTo(map);
        }

        layer.setStyle({
          weight: 6,
          radius: 6,
        });
      }

      function resetStation(e) {
        var layer = e.target;
        stationLayer.resetStyle(layer);
        info.updateStation();
        geodesicLine.remove();
      }

      function clickStation(e) {
        var layer = e.target;
        var feature = layer.feature;
        var props = feature.properties;
        window.open("https://www.qrz.com/db/" + props.call);
      }

      function onEachStation(feature, layer) {
        layer.on({
          mouseover: highlightStation,
          mouseout: resetStation,
          click: clickStation,
        });
      }

      function getStationColor(feature) {
        var props = feature.properties;
        return getColors(props)[4];
      }

      function stationStyle(feature) {
        var props = feature.properties;
        return props.confirmed
          ? {
              color: getColors(props)[4],
              radius: 4,
              fillColor: getColors(props)[2],
              opacity: 1,
              fillOpacity: 1.0,
            }
          : {
              color: getColors(props)[4],
              fillColor: getColors(props)[2],
              radius: 4,
              opacity: 0.5,
              fillOpacity: 0.5,
            };
      }

      var stationOptions = {
        pointToLayer: function (feature, latlng) {
          return L.circleMarker(latlng);
        },
        style: stationStyle,
        onEachFeature: onEachStation,
      };

      function highlightGrid(e) {
        var layer = e.target;
        var props = layer.feature.properties;

        info.updateGrid(props);

        layer.setStyle({
          weight: 5,
          color: getColors(props)[4],
          dashArray: "",
        });
      }

      function resetGrid(e) {
        gridLayer.resetStyle(e.target);
        info.updateGrid();
      }

      function clickGrid(e) {
        map.fitBounds(e.target.getBounds());
      }

      function onEachGrid(feature, layer) {
        layer.on({
          mouseover: highlightGrid,
          mouseout: resetGrid,
          click: clickGrid,
        });
      }

      function gridStyle(feature) {
        let props = feature.properties;
        return {
          color: getColors(props)[4],
          fillColor: getGridColor(feature),
          weight: 2,
          opacity: 1,
          fillOpacity: 0.4,
          dashArray: 3,
        };
      }

      var gridOptions = {
        style: gridStyle,
        onEachFeature: onEachGrid,
      };

      function clearMap() {
        if (geodesicLine) {
          geodesicLine.remove();
        }
        if (stationLayer) {
          map.removeLayer(stationLayer);
        }
        if (gridLayer) {
          map.removeLayer(gridLayer);
        }
        if (layerCtrl) {
          layerCtrl.remove();
        }
        globals = {};
      }

      function createLayerCtrl(json, stationLayer, gridLayer) {
        layerCtrl = L.control.layers(null, null, {
          collapsed: false,
          position: "topleft",
        });

        layerCtrl.addOverlay(gridLayer, "All Grids");
        layerCtrl.addOverlay(stationLayer, "All Stations");

        function addCounter(counter, propertyName) {
          if (counter && json.stations.features) {
            // Create clone to prevent resorting counter
            const counterClone = structuredClone(counter);
            counterClone.sort().forEach(function (stat, index) {
              let name = stat[0];
              let stations = json.stations.features.filter(function (feature) {
                if (!feature.properties) {
                  return false;
                }
                if (!feature.properties[propertyName]) {
                  return false;
                }
                let names = feature.properties[propertyName].map(
                  function (arr) {
                    return arr[0];
                  },
                );
                return names.find(function (el) {
                  return el == name;
                });
              });
              let features = stations.map(function (el) {
                return L.geoJSON(el, stationOptions);
              });
              let layerGroup = L.layerGroup(features);
              layerCtrl.addOverlay(layerGroup, name);
            });
          }
        }
        addCounter(json.globals.bands, "bands");
        addCounter(json.globals.modes, "modes");

        layerCtrl.addTo(map);
      }

      function geojsonLoad(json) {
        clearMap();
        globals = json.globals;
        grid_max_qsos = Math.log(globals.grid_max_qsos);
        stationLayer = L.geoJSON(json.stations, stationOptions).addTo(map);
        gridLayer = L.geoJSON(json.grids, gridOptions).addTo(map);

        createLayerCtrl(json, stationLayer, gridLayer);

        // Update info panel with new totals
        info.updateGrid(null);
        // Make sure stations are always on top or grid will mask them
        stationLayer.bringToFront();
        gridLayer.bringToBack();
      }

      /* For now, load sample data from a fixed location. In the
                     future, provide a way to users to convert their ADIF to
                     Grid Explorer GeoJSON to enable publishing/sharing their
                     contacts */
      async function getData() {
        const url = "https://ko6iue.org/assets/contacts.json";
        try {
          const response = await fetch(url);
          if (!response.ok) {
            throw new Error(`Response status: ${response.status}`);
          }

          const result = await response.json();
          geojsonLoad(result);
        } catch (error) {
          console.error(error.message);
        }
      }
      getData();

      document
        .getElementById("file-input")
        .addEventListener("change", function () {
          const file = this.files[0];

          const messageDisplay = document.getElementById("message");
          messageDisplay.textContent = ""; // Clear previous messages
          function showMessage(message) {
            messageDisplay.textContent = message;
            messageDisplay.style.color = "red";
          }

          if (!file) {
            showMessage("No file selected. Please choose a file.");
            return;
          }

          const reader = new FileReader();
          reader.onload = () => {
            var utf8 = stringToNewUTF8(reader.result);
            try {
              var rval = UTF8ToString(_adi2geojson(utf8));
              if (!rval || rval.length == 0) {
                showMessage("Invalid file. No ADIF data.");
                return;
              }
              var json = JSON.parse(rval);
              if (!json || json.length == 0 || !json.globals) {
                showMessage("Invalid JSON. Internal error.");
                return;
              }
              if (!json.globals.success) {
                showMessage(json.globals.error_msg);
                return;
              }
              geojsonLoad(json);
            } catch (e) {
              showMessage(e.message);
            }
          };
          reader.onerror = () => {
            showMessage("Error reading the file. Please try again.");
          };

          reader.readAsText(file);
        });
    </script>

  </body>
</html>
